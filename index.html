<!DOCTYPE html>
<html>
<head>
  <title>Kirim Email</title>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <script>
    emailjs.init("R7OxskkTgRB5UTMkw");
  </script>
</head>
<body>

<h2>Masukkan Email</h2>

<input type="email" id="email">
<button onclick="kirim()">Kirim</button>

<script>
function kirim() {

  let tujuan = document.getElementById("email").value;

  emailjs.send(
    "service_519m5wa",
    "template_nxvft3m",
    {
      to_email: tujuan
    }
  )
  .then(() => {
    alert("Email berhasil dikirim");
  })
  .catch((err) => {
    alert("Error");
    console.log(err);
  });

}
</script>

</body>
</html>
